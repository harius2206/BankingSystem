{% extends 'layout.html' %}

{% block body %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>{{ title }}</h2>
    <a href="/clients/create" class="btn btn-success">
        <i class="bi bi-plus-lg"></i> Створити нового
    </a>
</div>

<table class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>ПІБ</th>
            <th>Податковий номер</th>
            <th class="text-end">Дії</th>
        </tr>
    </thead>
    <tbody>
        {% for item in clients %}
        <tr>
            <td>{{ item.full_name }}</td>
            <td>{{ item.tax_id }}</td>
            <td class="text-end">
                <div class="btn-group" role="group">
                    <a href="/clients/edit/{{ item.id }}" class="btn btn-warning btn-sm" title="Редагувати">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a href="/clients/details/{{ item.id }}" class="btn btn-info btn-sm text-white" title="Деталі">
                        <i class="bi bi-info-circle"></i>
                    </a>
                    <a href="/clients/delete/{{ item.id }}" class="btn btn-danger btn-sm" title="Видалити">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
